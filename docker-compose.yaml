services:
  aipm-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./output:/app/output
      - ./input_bundles:/app/input_bundles
    healthcheck:
      test:
        - "CMD-SHELL"
        - >
          python -c
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
